services:
  - type: web
    name: mindforge
    runtime: python
    rootDir: mindforge
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://mindforge.onrender.com/api/auth/google/callback
