<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MindForge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #f6f7fb; }
    .input-field {
      background: #fff; border: 2px solid #e2e8f0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      outline: none; border-color: #4255ff;
      box-shadow: 0 0 0 3px rgba(66,85,255,0.12);
    }
    .btn-primary {
      background: #4255ff; transition: background 0.2s, transform 0.15s;
    }
    .btn-primary:hover:not(:disabled) { background: #3346e0; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .step { display: none; }
    .step.active { display: block; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .step-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0;
      transition: background 0.3s;
    }
    .step-dot.active { background: #4255ff; }
    .btn-google {
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .btn-google:hover { background: #f0f1ff; border-color: #a5b4fc; transform: translateY(-1px); }
    #avatar-anim {
      position: fixed; z-index: 50;
      width: 56px; height: 56px; border-radius: 50%;
      background: #4255ff;
      display: none; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: white;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1.4);
      transition: top 0.9s cubic-bezier(.4,0,.2,1),
                  left 0.9s cubic-bezier(.4,0,.2,1),
                  transform 0.9s cubic-bezier(.4,0,.2,1);
    }
    #avatar-anim.avatar-fly {
      top: 20px; left: 20px;
      transform: translate(0, 0) scale(1);
    }
  </style>
</head>
<body class="h-screen flex flex-col items-center justify-center px-4 relative overflow-hidden">

  <div id="avatar-anim">
    <span id="avatar-letter"></span>
  </div>

  <!-- Logo -->
  <div class="mb-4 flex items-center gap-2">
    <div class="w-9 h-9 rounded-lg bg-[#4255ff] flex items-center justify-center">
      <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
      </svg>
    </div>
    <span class="text-2xl font-extrabold text-gray-900 tracking-tight">Mind<span class="text-[#4255ff]">Forge</span></span>
  </div>

  <!-- Flash message -->
  <div id="flash-msg" class="hidden w-full max-w-sm mb-2 px-3 py-2 rounded-xl bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm text-center">
    ✓ Account created! Please log in.
  </div>

  <!-- Card -->
  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg border border-gray-100 p-6">

    <!-- Step dots -->
    <div class="flex justify-center gap-2 mb-4">
      <div class="step-dot active" id="dot-1"></div>
      <div class="step-dot" id="dot-2"></div>
      <div class="step-dot" id="dot-3"></div>
      <div class="step-dot" id="dot-4"></div>
    </div>

    <!-- Step 1: Auth method -->
    <div class="step active" id="step-1">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Welcome back</h1>
      <p class="text-sm text-gray-500 mb-4">How would you like to sign in?</p>
      <div class="space-y-3">
        <button onclick="loginGoStep(2)"
          class="w-full py-2.5 px-4 rounded-xl border-2 border-[#4255ff] text-[#4255ff] font-semibold text-sm flex items-center justify-center gap-2 hover:bg-[#eef0ff] transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          Continue with Email
        </button>
        <button id="google-signin-btn" onclick="triggerGoogleLogin()"
          class="btn-google w-full py-2.5 px-4 rounded-xl border-2 border-gray-200 text-gray-700 font-semibold text-sm flex items-center justify-center gap-2 bg-white">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>
        <div id="google-btn-wrapper" style="display:none;"></div>
      </div>
    </div>

    <!-- Step 2: Email + Password -->
    <div class="step" id="step-2">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Sign in</h1>
      <p class="text-sm text-gray-500 mb-3">Enter your credentials</p>
      <form id="login-form" novalidate class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email"
            class="input-field w-full px-4 py-2.5 rounded-xl text-gray-900 placeholder-gray-400 text-sm" />
          <p id="err-email" class="hidden mt-1 text-xs text-red-500"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
              class="input-field w-full px-4 py-2.5 rounded-xl text-gray-900 placeholder-gray-400 text-sm pr-10" />
            <button type="button" onclick="togglePwd('password')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p id="err-password" class="hidden mt-1 text-xs text-red-500"></p>
        </div>
        <div class="text-right">
          <button type="button" onclick="loginGoStep(3)" class="text-xs text-[#4255ff] hover:underline">Forgot password?</button>
        </div>
        <p id="err-form" class="hidden text-xs text-red-500 bg-red-50 border border-red-200 rounded-xl px-3 py-2"></p>
        <div id="reset-success" class="hidden text-xs text-emerald-600 bg-emerald-50 border border-emerald-200 rounded-xl px-3 py-2">✓ Password reset! Please sign in.</div>
        <button id="submit-btn" type="submit"
          class="btn-primary w-full py-2.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2 mt-2">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden"><span class="spinner"></span></span>
        </button>
      </form>
      <button onclick="loginGoStep(1)" class="mt-4 text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1 mx-auto">
        ← Back
      </button>
    </div>

    <!-- Step 3: Forgot Password — enter email -->
    <div class="step" id="step-3">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Forgot password?</h1>
      <p class="text-sm text-gray-500 mb-3">We'll send a reset code to your email</p>
      <form id="forgot-form" novalidate class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input id="forgot-email" type="email" placeholder="you@example.com" autocomplete="email"
            class="input-field w-full px-4 py-2.5 rounded-xl text-gray-900 placeholder-gray-400 text-sm" />
          <p id="err-forgot-email" class="hidden mt-1 text-xs text-red-500"></p>
        </div>
        <p id="err-forgot-form" class="hidden text-xs text-red-500 bg-red-50 border border-red-200 rounded-xl px-3 py-2"></p>
        <button id="forgot-btn" type="submit"
          class="btn-primary w-full py-2.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2 mt-2">
          <span class="btn-text">Send Reset Code</span>
          <span class="btn-spinner hidden"><span class="spinner"></span></span>
        </button>
      </form>
      <button onclick="loginGoStep(2)" class="mt-4 text-xs text-gray-400 hover:text-gray-600 flex items-center gap-1 mx-auto">
        ← Back
      </button>
    </div>

    <!-- Step 4: Reset Password — OTP + new password -->
    <div class="step" id="step-4">
      <h1 class="text-2xl font-bold text-gray-900 mb-1">Reset password</h1>
      <p class="text-sm text-gray-500 mb-3">Code sent to <span id="reset-email-display" class="font-semibold text-gray-700"></span></p>
      <form id="reset-form" novalidate class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Verification Code</label>
          <input id="reset-otp" type="text" inputmode="numeric" maxlength="6" placeholder="••••••"
            class="input-field w-full px-4 py-2.5 rounded-xl text-gray-900 placeholder-gray-400 text-sm tracking-widest text-center text-lg" />
          <p id="err-reset-otp" class="hidden mt-1 text-xs text-red-500"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
          <div class="relative">
            <input id="reset-password" type="password" placeholder="Min. 6 characters"
              class="input-field w-full px-4 py-2.5 rounded-xl text-gray-900 placeholder-gray-400 text-sm pr-10" />
            <button type="button" onclick="togglePwd('reset-password')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p id="err-reset-password" class="hidden mt-1 text-xs text-red-500"></p>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <div class="relative">
            <input id="reset-confirm" type="password" placeholder="Re-enter password"
              class="input-field w-full px-4 py-2.5 rounded-xl text-gray-900 placeholder-gray-400 text-sm pr-10" />
            <button type="button" onclick="togglePwd('reset-confirm')"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p id="err-reset-confirm" class="hidden mt-1 text-xs text-red-500"></p>
        </div>
        <p id="err-reset-form" class="hidden text-xs text-red-500 bg-red-50 border border-red-200 rounded-xl px-3 py-2"></p>
        <button id="reset-btn" type="submit"
          class="btn-primary w-full py-2.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2 mt-2">
          <span class="btn-text">Reset Password</span>
          <span class="btn-spinner hidden"><span class="spinner"></span></span>
        </button>
      </form>
      <div class="mt-3 text-center">
        <button onclick="handleForgotResend()" class="text-xs text-[#4255ff] hover:underline">Resend code</button>
      </div>
    </div>

    <div class="mt-4 pt-4 border-t border-gray-100 text-center text-sm text-gray-500">
      Don't have an account?
      <a href="signup.html" class="text-[#4255ff] hover:underline font-semibold ml-1">Sign up for free</a>
    </div>
  </div>

  <script>
    function loginGoStep(n) {
      document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i + 1 === n));
      for (let i = 1; i <= 4; i++) {
        const d = document.getElementById(`dot-${i}`);
        if (d) d.classList.toggle('active', i === n);
      }
    }

    function togglePwd(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    async function handleForgotResend() {
      const email = sessionStorage.getItem('mf_reset_email');
      if (!email) return;
      await fetch('http://localhost:5000/api/auth/send-otp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, purpose: 'reset' })
      });
    }

    const GOOGLE_CLIENT_ID = '554482016091-elsto1gd07q56t9ni97ho43rgjvvmh59.apps.googleusercontent.com';
    const GOOGLE_REDIRECT_URI = 'http://127.0.0.1:5000/api/auth/google/callback';

    function triggerGoogleLogin() {
      const params = new URLSearchParams({
        client_id: GOOGLE_CLIENT_ID,
        redirect_uri: GOOGLE_REDIRECT_URI,
        response_type: 'code',
        scope: 'openid email profile',
        access_type: 'offline',
        prompt: 'select_account'
      });
      const popup = window.open(
        'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString(),
        'google-login', 'width=500,height=600,left=200,top=100'
      );
      window.addEventListener('message', async function handler(e) {
        if (e.origin !== 'http://127.0.0.1:5000') return;
        window.removeEventListener('message', handler);
        if (e.data.error) { alert(e.data.error); return; }
        localStorage.setItem('mf_token', e.data.token);
        localStorage.setItem('mf_user', JSON.stringify(e.data.user));
        const profileRes = await fetch('http://127.0.0.1:5000/api/learner-profiling', {
          headers: { 'Authorization': 'Bearer ' + e.data.token }
        });
        window.location.href = profileRes.ok ? '/dashboard.html' : '/pages/learner-profiling.html';
      });
    }
  </script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
