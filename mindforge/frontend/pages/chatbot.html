<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat — MindForge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Inter', sans-serif; box-sizing: border-box; }
    body { background: #0f0f1a; color: #e2e8f0; margin: 0; height: 100vh; overflow: hidden; display: flex; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d2d4a; border-radius: 99px; }

    /* ── Sidebar placeholder ── */
    #app-sidebar { width: 240px; min-width: 240px; }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #0f0f1a; }

    /* ── Header ── */
    #chat-header {
      background: #13131f;
      border-bottom: 1px solid #1e1e30;
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }

    /* ── Messages ── */
    #messages {
      flex: 1; overflow-y: auto; padding: 28px 24px;
      display: flex; flex-direction: column; gap: 20px;
    }

    /* ── Bubble base ── */
    .bubble-ai {
      background: #1a1a2e;
      border: 1px solid #2a2a45;
      color: #e2e8f0;
      border-radius: 0 16px 16px 16px;
      padding: 14px 18px;
      max-width: 72%;
      font-size: 0.875rem;
      line-height: 1.7;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .bubble-user {
      background: linear-gradient(135deg, #6C5CE7, #4A90E2);
      color: #fff;
      border-radius: 16px 0 16px 16px;
      padding: 14px 18px;
      max-width: 65%;
      font-size: 0.875rem;
      line-height: 1.7;
      box-shadow: 0 2px 12px rgba(108,92,231,0.3);
      white-space: pre-wrap;
    }

    /* ── Markdown in AI bubble ── */
    .bubble-ai p { margin: 0 0 8px; }
    .bubble-ai p:last-child { margin-bottom: 0; }
    .bubble-ai strong { color: #c4b5fd; font-weight: 600; }
    .bubble-ai em { color: #93c5fd; font-style: italic; }
    .bubble-ai code {
      background: #0f0f1a; color: #a78bfa;
      padding: 2px 6px; border-radius: 5px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 0.8rem;
    }
    .bubble-ai pre {
      background: #0a0a14; border: 1px solid #2a2a45;
      border-radius: 10px; padding: 14px 16px;
      overflow-x: auto; margin: 10px 0;
    }
    .bubble-ai pre code { background: none; padding: 0; color: #a5f3fc; font-size: 0.8rem; }
    .bubble-ai ul, .bubble-ai ol { padding-left: 20px; margin: 6px 0; }
    .bubble-ai li { margin-bottom: 4px; }
    .bubble-ai h1, .bubble-ai h2, .bubble-ai h3 { color: #c4b5fd; font-weight: 700; margin: 10px 0 6px; }
    .bubble-ai h1 { font-size: 1.1rem; }
    .bubble-ai h2 { font-size: 1rem; }
    .bubble-ai h3 { font-size: 0.9rem; }
    .bubble-ai a { color: #60a5fa; text-decoration: underline; }
    .bubble-ai blockquote {
      border-left: 3px solid #6C5CE7; padding-left: 12px;
      color: #94a3b8; margin: 8px 0; font-style: italic;
    }
    .bubble-ai hr { border: none; border-top: 1px solid #2a2a45; margin: 10px 0; }

    /* ── Typing indicator ── */
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #6C5CE7; animation: blink 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

    /* ── Message animation ── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg-in { animation: fadeUp 0.25s ease forwards; }

    /* ── Input area ── */
    #input-area {
      background: #13131f;
      border-top: 1px solid #1e1e30;
      padding: 16px 24px 20px;
      flex-shrink: 0;
    }
    #input-wrap {
      background: #1a1a2e;
      border: 1.5px solid #2a2a45;
      border-radius: 16px;
      display: flex; align-items: flex-end; gap: 8px;
      padding: 10px 12px;
      transition: border-color 0.2s;
    }
    #input-wrap:focus-within { border-color: #6C5CE7; box-shadow: 0 0 0 3px rgba(108,92,231,0.12); }
    #chatInput {
      flex: 1; background: transparent; border: none; outline: none;
      color: #e2e8f0; font-size: 0.875rem; resize: none;
      max-height: 140px; min-height: 24px; line-height: 1.6;
      placeholder-color: #4a4a6a;
    }
    #chatInput::placeholder { color: #4a4a6a; }
    .icon-btn {
      background: transparent; border: none; cursor: pointer;
      color: #4a4a6a; padding: 6px; border-radius: 8px;
      transition: background 0.15s, color 0.15s;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-btn:hover { background: #2a2a45; color: #a78bfa; }
    .icon-btn.active { color: #7c3aed; }
    #sendBtn {
      background: linear-gradient(135deg, #6C5CE7, #4A90E2);
      border: none; cursor: pointer; color: white;
      padding: 8px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity 0.2s, transform 0.15s;
    }
    #sendBtn:hover:not(:disabled) { opacity: 0.9; transform: scale(1.05); }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Action buttons ── */
    .action-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .action-btn {
      font-size: 0.75rem; font-weight: 600; padding: 5px 12px;
      border-radius: 8px; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.15s;
    }
    .action-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
    .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-fc { background: linear-gradient(135deg,#6C5CE7,#4A90E2); color: white; }
    .btn-qz { background: linear-gradient(135deg,#00B894,#4A90E2); color: white; }

    /* ── Flashcard / Quiz results ── */
    .result-card {
      background: #1a1a2e; border: 1px solid #2a2a45;
      border-radius: 12px; padding: 12px 16px;
      font-size: 0.8rem; margin-top: 4px;
    }
    .quiz-opt {
      width: 100%; text-align: left; background: #13131f;
      border: 1px solid #2a2a45; border-radius: 8px;
      padding: 8px 12px; color: #cbd5e1; font-size: 0.8rem;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
      margin-top: 6px;
    }
    .quiz-opt:hover:not(:disabled) { border-color: #6C5CE7; background: #1e1e30; }

    /* ── Avatar ── */
    .ai-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg,#6C5CE7,#4A90E2);
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Empty state ── */
    #empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }

    /* ── Mic recording pulse ── */
    @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }
    .mic-active { color: #ef4444 !important; animation: micPulse 1s infinite; border-radius: 8px; }

    /* ── Suggestion chips ── */
    .chip {
      background: #1a1a2e; border: 1px solid #2a2a45;
      border-radius: 20px; padding: 8px 16px;
      font-size: 0.8rem; color: #94a3b8; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .chip:hover { border-color: #6C5CE7; color: #c4b5fd; background: #1e1e30; }

    /* ── Status dot ── */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #00B894; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="app-sidebar"></div>

<!-- ═══════════════════════════════ MAIN ═══════════════════════════════════ -->
<div id="main">

  <!-- Header -->
  <div id="chat-header">
    <div class="flex items-center gap-3">
      <div class="ai-avatar">
        <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
      </div>
      <div>
        <div class="flex items-center gap-2">
          <span class="font-bold text-white text-sm">MindForge AI</span>
          <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full" style="background:#1e1e30;color:#a78bfa">Pro</span>
          <span class="status-dot"></span>
          <span class="text-xs text-slate-500">Online</span>
        </div>
        <p class="text-xs text-slate-500 mt-0.5">Powered by SambaNova · Ask anything</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="newChat()" class="icon-btn flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2);color:white" title="New Chat">
        <i data-lucide="plus" class="w-3.5 h-3.5"></i> New Chat
      </button>
      <button id="ttsBtn" class="icon-btn" title="Voice reply OFF">
        <i data-lucide="volume-2" class="w-4 h-4"></i>
      </button>
      <button onclick="clearCurrentChat()" class="icon-btn" title="Clear chat">
        <i data-lucide="trash-2" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <!-- Empty state shown by JS -->
  </div>

  <!-- Input -->
  <div id="input-area">
    <input id="fileInput" type="file" class="hidden" accept="image/*,.pdf,.txt,.md,.csv,.py,.js,.ts,.html,.css,.json" />
    <div id="input-wrap">
      <textarea id="chatInput" rows="1" placeholder="Ask MindForge AI anything…"></textarea>
      <div class="flex items-center gap-1">
        <button id="attachBtn" class="icon-btn" title="Attach file">
          <i data-lucide="paperclip" class="w-4 h-4"></i>
        </button>
        <button id="micBtn" class="icon-btn" title="Voice input">
          <i data-lucide="mic" class="w-4 h-4"></i>
        </button>
        <button id="sendBtn" title="Send" disabled>
          <i data-lucide="send" class="w-4 h-4"></i>
        </button>
      </div>
    </div>
    <p class="text-[11px] text-slate-600 text-center mt-2">MindForge AI can make mistakes. Verify important information.</p>
  </div>
</div>

<script>
const token = localStorage.getItem("mf_token");
if (!token) window.location.href = "../login.html";
function logout() {
  localStorage.removeItem("mf_token");
  localStorage.removeItem("mf_user");
  window.location.href = "../login.html";
}
lucide.createIcons();
</script>
<script src="../assets/js/sidebar.js"></script>
<script src="../assets/js/chatbot2.js" defer></script>
</body>
</html>
