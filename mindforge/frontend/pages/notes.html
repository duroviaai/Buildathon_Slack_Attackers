<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes — MindForge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f0f2f8; }
    .sidebar { width: 240px; min-width: 240px; }
    .main-area { width: calc(100% - 240px); }
    .gradient-btn { background: linear-gradient(135deg, #6C5CE7, #4A90E2); }
    .nav-item:hover { background: #ede9fe; color: #6C5CE7; }
    .nav-item.active { background: #ede9fe; color: #6C5CE7; font-weight: 600; }

    .dark body { background: #0f0f1a; }
    .dark .sidebar-bg { background: #1a1a2e; }
    .dark .main-bg { background: #0f0f1a; }
    .dark .card-bg { background: #1e1e30; }
    .dark .navbar-bg { background: #1a1a2e; border-color: #2a2a40; }
    .dark .text-main { color: #e2e8f0; }
    .dark .text-sub { color: #94a3b8; }
    .dark .input-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .nav-item:hover { background: #2a2a40; }
    .dark .nav-item.active { background: #2a2a40; }
    .dark .search-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .icon-btn { color: #94a3b8; }
    .dark .sidebar-bottom { border-color: #2a2a40; }
    .dark .note-card { background: #1e1e30; border-color: #2a2a40; }
    .dark .modal-bg { background: #1e1e30; }
    .dark .modal-input { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .upload-btn { background: #2a2a40; border-color: #3a3a55; color: #94a3b8; }
    .dark .upload-btn:hover { background: #3a2a55; border-color: #6C5CE7; }

    .btn-primary {
      background: linear-gradient(135deg, #6C5CE7, #4A90E2);
      box-shadow: 0 4px 12px rgba(108,92,231,0.3);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(108,92,231,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .upload-btn {
      background: #f9fafb; border: 1px solid #e5e7eb; color: #6b7280;
      transition: all 0.15s;
    }
    .upload-btn:hover { background: #ede9fe; border-color: #6C5CE7; color: #6C5CE7; }

    .note-card { transition: box-shadow 0.2s; }
    .note-card:hover { box-shadow: 0 4px 20px rgba(108,92,231,0.12); }

    .modal-overlay { background: rgba(0,0,0,0.45); }

    .spinner {
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-appear { animation: slideUp 0.3s ease forwards; }
  </style>
</head>
<body class="min-h-screen flex">

  <div id="app-sidebar"></div>

  <!-- MAIN -->
  <div id="main" class="main-area flex flex-col min-h-screen">

    <!-- NAVBAR -->
    <header class="navbar-bg bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 sticky top-0 z-10">
      <div class="flex-1 relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input id="search-input" type="text" placeholder="Search notes..."
          oninput="filterNotes()"
          class="search-bg w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-300 transition" />
      </div>
      <div class="flex items-center gap-3">
        <button id="dark-toggle" onclick="toggleDark()" class="icon-btn p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition" title="Toggle dark mode">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button class="icon-btn relative p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition">
          <i data-lucide="bell" class="w-5 h-5"></i>
        </button>
        <div id="user-avatar" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">M</div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="main-bg flex-1 p-6 space-y-6 overflow-y-auto">

      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-extrabold text-gray-800 text-main">Your Notes</h1>
          <p class="text-sm text-gray-500 text-sub mt-0.5">Store and manage your study notes and files</p>
        </div>
        <button onclick="openModal()" class="btn-primary px-5 py-2.5 rounded-xl text-white font-semibold text-sm flex items-center gap-2">
          <i data-lucide="plus" class="w-4 h-4"></i> New Note
        </button>
      </div>

      <!-- Empty state -->
      <div id="empty-state" class="hidden card-bg bg-white rounded-2xl shadow-sm border border-gray-100 py-16 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-violet-50 border border-violet-200 mb-4">
          <i data-lucide="notebook-pen" class="w-8 h-8 text-violet-500"></i>
        </div>
        <h3 class="text-base font-bold text-gray-700 text-main mb-1">No Notes Yet</h3>
        <p class="text-sm text-gray-400 text-sub max-w-sm mx-auto">Click "New Note" to create your first note or upload a file.</p>
      </div>

      <!-- Notes grid -->
      <div id="notes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    </main>
  </div>

  <!-- MODAL -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-overlay px-4">
    <div class="modal-bg bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 space-y-4">
      <div class="flex items-center justify-between">
        <h2 id="modal-title" class="text-lg font-bold text-gray-800 text-main">New Note</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <div class="space-y-3">
        <input id="note-title" type="text" placeholder="Title *"
          class="modal-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-violet-300 transition" />

        <textarea id="note-content" rows="5" placeholder="Write your notes here..."
          class="modal-input w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 resize-none focus:outline-none focus:ring-2 focus:ring-violet-300 transition"></textarea>

        <!-- File attach -->
        <div class="flex items-center gap-3">
          <input type="file" id="note-file" class="hidden" accept=".txt,.pdf,.doc,.docx,.png,.jpg,.jpeg" />
          <label for="note-file" class="upload-btn flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium cursor-pointer">
            <i data-lucide="paperclip" class="w-3.5 h-3.5"></i> Attach file
          </label>
          <span id="file-chip" class="hidden items-center gap-2 bg-violet-50 border border-violet-200 text-violet-700 px-3 py-1.5 rounded-lg text-xs">
            <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
            <span id="file-chip-name"></span>
            <button type="button" onclick="clearFile()" class="text-gray-400 hover:text-red-500 ml-1">✕</button>
          </span>
        </div>
      </div>

      <p id="modal-error" class="hidden text-sm text-red-500 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></p>

      <div class="flex justify-end gap-3 pt-1">
        <button onclick="closeModal()" class="px-4 py-2 rounded-xl text-sm text-gray-600 hover:bg-gray-100 transition">Cancel</button>
        <button id="save-btn" onclick="saveNote()" class="btn-primary px-6 py-2 rounded-xl text-white font-semibold text-sm flex items-center gap-2">
          <span id="save-text">Save Note</span>
          <span id="save-spinner" class="hidden"><span class="spinner"></span></span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const API = "/api";
    let token = localStorage.getItem("mf_token");
    let editingId = null;
    let allNotes = [];

    if (!token) window.location.href = "../login.html";

    const user = JSON.parse(localStorage.getItem("mf_user") || "null");
    const initial = user ? user.name.charAt(0).toUpperCase() : "M";
    document.getElementById("user-avatar").textContent = initial;

    function toggleDark() {
      document.documentElement.classList.toggle("dark");
      const icon = document.querySelector("#dark-toggle i");
      const isDark = document.documentElement.classList.contains("dark");
      icon.setAttribute("data-lucide", isDark ? "sun" : "moon");
      lucide.createIcons();
    }

    // ── File chip ──────────────────────────────────────────────
    document.getElementById("note-file").addEventListener("change", function () {
      const chip = document.getElementById("file-chip");
      if (this.files[0]) {
        document.getElementById("file-chip-name").textContent = this.files[0].name;
        chip.classList.remove("hidden");
        chip.classList.add("flex");
      }
    });

    function clearFile() {
      document.getElementById("note-file").value = "";
      const chip = document.getElementById("file-chip");
      chip.classList.add("hidden");
      chip.classList.remove("flex");
    }

    // ── Modal ──────────────────────────────────────────────────
    function openModal(note = null) {
      editingId = note ? note.id : null;
      document.getElementById("modal-title").textContent = note ? "Edit Note" : "New Note";
      document.getElementById("note-title").value = note ? note.title : "";
      document.getElementById("note-content").value = note ? (note.content || "") : "";
      document.getElementById("save-text").textContent = note ? "Update Note" : "Save Note";
      document.getElementById("modal-error").classList.add("hidden");
      clearFile();
      document.getElementById("modal").classList.remove("hidden");
      lucide.createIcons();
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
      editingId = null;
    }

    // close on backdrop click
    document.getElementById("modal").addEventListener("click", function (e) {
      if (e.target === this) closeModal();
    });

    // ── Save / Update ──────────────────────────────────────────
    async function saveNote() {
      const title = document.getElementById("note-title").value.trim();
      const content = document.getElementById("note-content").value.trim();
      const fileInput = document.getElementById("note-file");
      const errEl = document.getElementById("modal-error");

      if (!title) {
        errEl.textContent = "Title is required.";
        errEl.classList.remove("hidden");
        return;
      }
      errEl.classList.add("hidden");

      const btn = document.getElementById("save-btn");
      btn.disabled = true;
      document.getElementById("save-text").classList.add("hidden");
      document.getElementById("save-spinner").classList.remove("hidden");

      const fd = new FormData();
      fd.append("title", title);
      fd.append("content", content);
      if (fileInput.files[0]) fd.append("file", fileInput.files[0]);

      try {
        const url = editingId ? `${API}/notes/${editingId}` : `${API}/notes`;
        const method = editingId ? "PUT" : "POST";
        const res = await fetch(url, {
          method,
          headers: { Authorization: `Bearer ${token}` },
          body: fd,
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to save");
        closeModal();
        await loadNotes();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        document.getElementById("save-text").classList.remove("hidden");
        document.getElementById("save-spinner").classList.add("hidden");
      }
    }

    // ── Delete ─────────────────────────────────────────────────
    async function deleteNote(id) {
      if (!confirm("Delete this note?")) return;
      await fetch(`${API}/notes/${id}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${token}` },
      });
      await loadNotes();
    }

    // ── Download file ──────────────────────────────────────────
    async function downloadFile(id, filename) {
      const res = await fetch(`${API}/notes/${id}/file`, { headers: { Authorization: `Bearer ${token}` } });
      if (!res.ok) return alert("File not found.");
      const blob = await res.blob();
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename || "file";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // ── Render ─────────────────────────────────────────────────
    function renderNotes(notes) {
      const grid = document.getElementById("notes-grid");
      const empty = document.getElementById("empty-state");
      grid.innerHTML = "";

      if (!notes.length) {
        empty.classList.remove("hidden");
        return;
      }
      empty.classList.add("hidden");

      notes.forEach(n => {
        const date = new Date(n.updated_at).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
        const preview = (n.content || "").slice(0, 120) || "<span class='italic text-gray-400'>No content</span>";

        const card = document.createElement("div");
        card.className = "note-card card-bg bg-white rounded-2xl border border-gray-100 p-5 flex flex-col gap-3 card-appear";
        card.innerHTML = `
          <div class="flex items-start justify-between gap-2">
            <h3 class="text-sm font-bold text-gray-800 text-main leading-snug line-clamp-2">${escHtml(n.title)}</h3>
            <div class="flex gap-1 flex-shrink-0">
              <button onclick='openModal(${JSON.stringify(n)})' class="p-1.5 rounded-lg hover:bg-violet-50 text-gray-400 hover:text-violet-600 transition" title="Edit">
                <i data-lucide="pencil" class="w-3.5 h-3.5"></i>
              </button>
              <button onclick="deleteNote(${n.id})" class="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500 transition" title="Delete">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
              </button>
            </div>
          </div>
          <p class="text-xs text-gray-500 text-sub line-clamp-3">${preview}</p>
          <div class="flex items-center justify-between mt-auto pt-2 border-t border-gray-100">
            <span class="text-xs text-gray-400">${date}</span>
            ${n.has_file ? `<button onclick="downloadFile(${n.id}, '${escHtml(n.file_name || 'file')}')" class="flex items-center gap-1 text-xs text-violet-600 hover:underline"><i data-lucide="download" class="w-3 h-3"></i>${escHtml(n.file_name || 'File')}</button>` : ""}
          </div>`;
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Search ─────────────────────────────────────────────────
    function filterNotes() {
      const q = document.getElementById("search-input").value.toLowerCase();
      renderNotes(allNotes.filter(n =>
        n.title.toLowerCase().includes(q) || (n.content || "").toLowerCase().includes(q)
      ));
    }

    // ── Load ───────────────────────────────────────────────────
    async function loadNotes() {
      try {
        const res = await fetch(`${API}/notes`, { headers: { Authorization: `Bearer ${token}` } });
        if (res.status === 401) { logout(); return; }
        allNotes = await res.json();
        filterNotes();
      } catch {
        document.getElementById("empty-state").classList.remove("hidden");
      }
    }

    lucide.createIcons();
    loadNotes();
  </script>
  <script src="../assets/js/sidebar.js"></script>
</body>
</html>
