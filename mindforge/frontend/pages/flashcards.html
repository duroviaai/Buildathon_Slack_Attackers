<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards — MindForge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f0f2f8; }
    .sidebar { width: 240px; min-width: 240px; }
    .main-area { width: calc(100% - 240px); }
    .gradient-btn { background: linear-gradient(135deg, #6C5CE7, #4A90E2); }
    .nav-item:hover { background: #ede9fe; color: #6C5CE7; }
    .nav-item.active { background: #ede9fe; color: #6C5CE7; font-weight: 600; }
    .dark body { background: #0f0f1a; }
    .dark .sidebar-bg { background: #1a1a2e; }
    .dark .main-bg { background: #0f0f1a; }
    .dark .card-bg { background: #1e1e30; }
    .dark .navbar-bg { background: #1a1a2e; border-color: #2a2a40; }
    .dark .text-main { color: #e2e8f0; }
    .dark .text-sub { color: #94a3b8; }
    .dark .input-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .nav-item:hover { background: #2a2a40; }
    .dark .nav-item.active { background: #2a2a40; }
    .dark .search-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .icon-btn { color: #94a3b8; }
    .dark .sidebar-bottom { border-color: #2a2a40; }
    .dark .fc-card { background: #1e1e30; border-color: #2a2a40; }
    .dark .fc-input-box { background: #2a2a40; border-color: #3a3a55; }
    .dark .fc-textarea { background: transparent; color: #e2e8f0; }
    .dark .fc-toolbar { border-color: #3a3a55; }
    .dark .count-pill { background: #2a2a40; border-color: #3a3a55; color: #94a3b8; }
    .dark .count-pill:hover { background: #3a2a55; border-color: #6C5CE7; color: #c4b5fd; }
    .dark .count-pill.selected { background: linear-gradient(135deg,rgba(108,92,231,0.4),rgba(74,144,226,0.4)); border-color: #6C5CE7; color: #fff; }
    .dark .upload-btn { background: #2a2a40; border-color: #3a3a55; color: #94a3b8; }
    .dark .upload-btn:hover { background: #3a2a55; border-color: #6C5CE7; }
    .dark .empty-icon-bg { background: rgba(108,92,231,0.1); border-color: rgba(108,92,231,0.3); }
    .dark .flashcard-front { background: rgba(108,92,231,0.1); border-color: rgba(108,92,231,0.3); }
    .dark .flashcard-back { background: rgba(74,144,226,0.1); border-color: rgba(74,144,226,0.3); }

    /* Flashcard flip */
    .flashcard { perspective: 1000px; cursor: pointer; }
    .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
    .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
    .flashcard-front, .flashcard-back {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; border-radius: 12px;
      padding: 24px; display: flex; align-items: center; justify-content: center; text-align: center;
    }
    .flashcard-front { background: #ede9fe; border: 1px solid #ddd6fe; }
    .flashcard-back { background: #e0f2fe; border: 1px solid #bae6fd; transform: rotateY(180deg); }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-appear { animation: slideUp 0.35s ease forwards; }

    .count-pill {
      background: #f3f4f6; border: 1px solid #e5e7eb; color: #6b7280;
      cursor: pointer; transition: all 0.15s;
    }
    .count-pill:hover { background: #ede9fe; border-color: #6C5CE7; color: #6C5CE7; }
    .count-pill.selected { background: linear-gradient(135deg,#6C5CE7,#4A90E2); border-color: #6C5CE7; color: #fff; box-shadow: 0 2px 8px rgba(108,92,231,0.3); }

    .upload-btn {
      background: #f9fafb; border: 1px solid #e5e7eb; color: #6b7280;
      transition: all 0.15s;
    }
    .upload-btn:hover { background: #ede9fe; border-color: #6C5CE7; color: #6C5CE7; }

    .file-chip { background: #ede9fe; border: 1px solid #ddd6fe; color: #6C5CE7; }

    .fc-input-box {
      background: #f9fafb; border: 1px solid #e5e7eb;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .fc-input-box:focus-within { border-color: #6C5CE7; box-shadow: 0 0 0 3px rgba(108,92,231,0.12); }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-generate {
      background: linear-gradient(135deg, #6C5CE7, #4A90E2);
      box-shadow: 0 4px 12px rgba(108,92,231,0.3);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-generate:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(108,92,231,0.4); }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body class="min-h-screen flex">

  <div id="app-sidebar"></div>

  <!-- MAIN -->
  <div id="main" class="main-area flex flex-col min-h-screen">

    <!-- TOP NAVBAR -->
    <header class="navbar-bg bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 sticky top-0 z-10">
      <div class="flex-1 relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" placeholder="Search flashcards..."
          class="search-bg w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-300 transition" />
      </div>
      <div class="flex items-center gap-3">
        <button id="dark-toggle" onclick="toggleDark()" class="icon-btn p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition" title="Toggle dark mode">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button class="icon-btn relative p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition">
          <i data-lucide="bell" class="w-5 h-5"></i>
        </button>
        <div id="user-avatar" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">M</div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="main-bg flex-1 p-6 space-y-6 overflow-y-auto">

      <!-- Page Header -->
      <div>
        <h1 class="text-2xl font-extrabold text-gray-800 text-main">Flashcards</h1>
        <p class="text-sm text-gray-500 text-sub mt-0.5">Generate AI-powered flashcards from your notes</p>
      </div>

      <!-- Input Card -->
      <div class="card-bg bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

        <!-- Notes / File input -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 text-main mb-2">Notes / File</label>
          <div class="fc-input-box rounded-xl overflow-hidden">
            <textarea id="notes-input" rows="5"
              placeholder="Paste your notes here, or attach a file below..."
              class="fc-textarea w-full px-4 pt-4 pb-2 bg-transparent text-gray-800 placeholder-gray-400 text-sm resize-none focus:outline-none text-main"></textarea>
            <div class="fc-toolbar flex items-center gap-3 px-3 pb-3 pt-1 border-t border-gray-100">
              <input type="file" id="file-input" class="hidden" accept=".txt,.pdf,.doc,.docx" />
              <label for="file-input" class="upload-btn flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer">
                <i data-lucide="paperclip" class="w-3.5 h-3.5"></i> Attach file
              </label>
              <span id="file-chip" class="hidden file-chip items-center gap-2 px-3 py-1.5 rounded-lg text-xs">
                <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                <span id="file-name"></span>
                <button id="file-clear" class="text-gray-400 hover:text-red-500 ml-1">✕</button>
              </span>
            </div>
          </div>
        </div>

        <!-- Count + Generate -->
        <div class="flex items-end justify-between gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 text-main mb-2">Number of Flashcards</label>
            <div class="flex flex-wrap gap-2" id="count-picker">
              <button type="button" data-value="5"  class="count-pill px-4 py-1.5 rounded-lg text-sm font-semibold">5</button>
              <button type="button" data-value="10" class="count-pill selected px-4 py-1.5 rounded-lg text-sm font-semibold">10</button>
              <button type="button" data-value="15" class="count-pill px-4 py-1.5 rounded-lg text-sm font-semibold">15</button>
              <button type="button" data-value="20" class="count-pill px-4 py-1.5 rounded-lg text-sm font-semibold">20</button>
              <button type="button" data-value="25" class="count-pill px-4 py-1.5 rounded-lg text-sm font-semibold">25</button>
              <button type="button" data-value="30" class="count-pill px-4 py-1.5 rounded-lg text-sm font-semibold">30</button>
            </div>
            <input type="hidden" id="card-count" value="10" />
          </div>
          <button id="generate-btn" class="btn-generate px-7 py-2.5 rounded-xl text-white font-semibold text-sm flex items-center gap-2 flex-shrink-0">
            <span id="btn-text">Generate Flashcards</span>
            <span id="btn-spinner" class="hidden"><span class="spinner"></span></span>
            <i id="btn-icon" data-lucide="zap" class="w-4 h-4"></i>
          </button>
        </div>

        <p id="error-msg" class="hidden mt-4 text-sm text-red-500 bg-red-50 border border-red-200 rounded-lg px-4 py-3"></p>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="card-bg bg-white rounded-2xl shadow-sm border border-gray-100 py-16 text-center">
        <div class="empty-icon-bg inline-flex items-center justify-center w-16 h-16 rounded-full bg-violet-50 border border-violet-200 mb-4">
          <i data-lucide="layers" class="w-8 h-8 text-violet-500"></i>
        </div>
        <h3 class="text-base font-bold text-gray-700 text-main mb-1">No Flashcards Yet</h3>
        <p class="text-sm text-gray-400 text-sub max-w-sm mx-auto">Paste your notes or upload a file above, then click "Generate Flashcards" to get started.</p>
      </div>

      <!-- Flashcards Grid -->
      <div id="flashcards-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    </main>
  </div>

  <script src="../assets/js/flashcard.js"></script>
  <script src="../assets/js/sidebar.js"></script>
  <script>
    lucide.createIcons();

    const token = localStorage.getItem("mf_token");
    if (!token) window.location.href = "../login.html";

    const user = JSON.parse(localStorage.getItem("mf_user") || "null");
    const initial = user ? user.name.charAt(0).toUpperCase() : "M";
    document.getElementById("user-avatar").textContent = initial;

    function toggleDark() {
      document.documentElement.classList.toggle("dark");
      const icon = document.querySelector("#dark-toggle i");
      const isDark = document.documentElement.classList.contains("dark");
      icon.setAttribute("data-lucide", isDark ? "sun" : "moon");
      lucide.createIcons();
    }
  </script>
</body>
</html>
