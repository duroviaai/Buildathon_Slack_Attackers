<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learner Profiling — MindForge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f0f2f8; }
    .sidebar { width: 240px; min-width: 240px; }
    .main-area { width: calc(100% - 240px); }
    .gradient-btn { background: linear-gradient(135deg, #6C5CE7, #4A90E2); }
    .nav-item:hover { background: #ede9fe; color: #6C5CE7; }
    .nav-item.active { background: #ede9fe; color: #6C5CE7; font-weight: 600; }

    /* dark mode */
    .dark body { background: #0f0f1a; }
    .dark .sidebar-bg { background: #1a1a2e; }
    .dark .main-bg { background: #0f0f1a; }
    .dark .card-bg { background: #1e1e30; border-color: #2a2a40; }
    .dark .navbar-bg { background: #1a1a2e; border-color: #2a2a40; }
    .dark .text-main { color: #e2e8f0; }
    .dark .text-sub { color: #94a3b8; }
    .dark .input-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .nav-item:hover { background: #2a2a40; }
    .dark .nav-item.active { background: #2a2a40; }
    .dark .search-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .icon-btn { color: #94a3b8; }
    .dark .sidebar-bottom { border-color: #2a2a40; }
    .dark .wizard-card { background: #1e1e30; border-color: #2a2a40; }
    .dark .wizard-card h1 { color: #e2e8f0; }
    .dark .wizard-card p { color: #94a3b8; }
    .dark .option-btn { background: #1e1e30; border-color: #3a3a55; color: #e2e8f0; }
    .dark .option-btn:hover { border-color: #6C5CE7; background: #2a2a40; }
    .dark .option-btn.selected { border-color: #6C5CE7; background: rgba(108,92,231,0.15); }
    .dark .text-input { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .back-btn { border-color: #3a3a55; color: #94a3b8; }
    .dark .back-btn:hover { background: #2a2a40; }
    .dark .step-badge { background: #2a2a40; color: #94a3b8; border-color: #3a3a55; }

    /* wizard */
    .option-btn { transition: all 180ms ease; }
    .option-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(108,92,231,0.12); }
    .option-btn.selected { border-color: #6C5CE7; background: rgba(108,92,231,0.06); box-shadow: 0 8px 24px rgba(108,92,231,0.15); }
    .option-btn.selected .tick { opacity: 1; transform: scale(1); }
    .tick { opacity: 0; transform: scale(0.8); transition: all 180ms ease; }
    .progress-bar { transition: width 420ms cubic-bezier(0.16,1,0.3,1); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }
    .screen-enter { animation: fadeSlideIn 0.35s ease forwards; }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .check-path { stroke-dasharray:100; stroke-dashoffset:100; animation: drawCheck 0.8s ease forwards 0.25s; }
    @keyframes drawCheck { 0%{stroke-dashoffset:100} 100%{stroke-dashoffset:0} }
    .confetti-piece { position:absolute; top:0; width:10px; height:16px; border-radius:999px; animation: confettiFall 1.6s ease-out forwards; }
    @keyframes confettiFall { 0%{opacity:1;transform:translateY(-10px) rotate(0deg)} 100%{opacity:0;transform:translateY(220px) rotate(540deg)} }
    .text-input:focus { box-shadow: 0 0 0 3px rgba(108,92,231,0.15); }
  </style>
</head>
<body class="min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="sidebar sidebar-bg bg-[#f8f9fc] h-screen fixed left-0 top-0 flex flex-col border-r border-gray-200 z-20">
    <div class="flex-1 flex flex-col overflow-y-auto">
      <!-- Logo -->
      <div class="px-5 py-5 flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <span class="text-xl font-extrabold tracking-tight text-gray-800">Mind<span style="color:#6C5CE7">Forge</span></span>
      </div>

      <!-- Nav -->
      <nav class="px-3 space-y-0.5">
        <a href="../dashboard.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="home" class="w-4 h-4"></i> Home
        </a>
        <a href="notes.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="library" class="w-4 h-4"></i> Your Library
        </a>
        <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="bell" class="w-4 h-4"></i> Notifications
        </a>
        <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="folder" class="w-4 h-4"></i> Folders
        </a>
        <a href="flashcards.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="layers" class="w-4 h-4"></i> Flashcards
        </a>
        <a href="notes.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="book-open" class="w-4 h-4"></i> Study Guides
        </a>
        <a href="quiz.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="clipboard-list" class="w-4 h-4"></i> Quiz
        </a>

      </nav>
    </div>

    <!-- Bottom -->
    <div class="mt-auto sidebar-bottom border-t border-gray-200 px-4 py-4 space-y-1">
      <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 transition cursor-pointer">
        <i data-lucide="file-text" class="w-4 h-4"></i> Terms
      </a>
      <a href="#" onclick="logout()" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 transition cursor-pointer">
        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
      </a>
      <div class="flex items-center gap-3 pt-4 mt-2 border-t border-gray-200">
        <div class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)" id="sidebar-avatar">M</div>
        <div class="overflow-hidden">
          <p class="text-sm font-semibold text-gray-800 truncate text-main" id="sidebar-name">User</p>
          <p class="text-xs text-gray-400 text-sub" id="sidebar-role">Student</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- RIGHT SIDE -->
  <div class="main-area ml-[240px] flex flex-col min-h-screen">

    <!-- TOP NAVBAR -->
    <header class="navbar-bg bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 sticky top-0 z-10">
      <div class="flex-1 relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" placeholder="Search for practice tests"
          class="search-bg w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-300 transition" />
      </div>
      <div class="flex items-center gap-3">
        <button id="dark-toggle" onclick="toggleDark()" class="icon-btn p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition" title="Toggle dark mode">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button class="icon-btn relative p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">3</span>
        </button>
        <div id="user-avatar" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)"></div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-bg flex-1 p-6 overflow-y-auto">

      <!-- Page header -->
      <div class="mb-6">
        <h1 class="text-xl font-bold text-gray-800 text-main">Learner Profiling</h1>
        <p class="text-sm text-gray-500 text-sub mt-0.5">Personalise your MindForge experience</p>
      </div>

      <!-- Progress bar -->
      <div class="mb-5 bg-white card-bg rounded-2xl border border-gray-100 px-5 py-4 shadow-sm flex items-center gap-4">
        <span class="text-sm font-semibold text-gray-500 text-sub whitespace-nowrap" id="stepText">Step 1 of 7</span>
        <div class="flex-1 bg-gray-100 rounded-full h-2.5 overflow-hidden">
          <div id="progressBar" class="h-2.5 rounded-full progress-bar" style="width:14%;background:linear-gradient(90deg,#6C5CE7,#4A90E2)"></div>
        </div>
        <span class="text-sm font-semibold whitespace-nowrap step-badge border border-gray-200 bg-gray-50 rounded-full px-3 py-0.5 text-gray-500" id="progressText">14%</span>
      </div>

      <!-- Wizard card -->
      <div class="wizard-card bg-white rounded-2xl border border-gray-100 shadow-sm p-6 sm:p-8 relative overflow-hidden">
        <div id="confettiLayer" class="pointer-events-none absolute inset-0 overflow-hidden"></div>
        <p class="text-xs text-gray-400 text-sub mb-4" id="stepHint">Let's begin with a quick introduction.</p>
        <div id="screen" class="screen-enter"></div>
      </div>

    </main>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:5000/api";
    const token = localStorage.getItem("mf_token");
    if (!token) window.location.href = "../login.html";

    // Always redirect to dashboard — profiling is now a popup there
    window.location.href = "../dashboard.html";

    lucide.createIcons();

    const user = JSON.parse(localStorage.getItem("mf_user") || "null");
    const initial = user ? user.name.charAt(0).toUpperCase() : "M";
    document.getElementById("user-avatar").textContent = initial;
    document.getElementById("sidebar-avatar").textContent = initial;
    if (user) {
      document.getElementById("sidebar-name").textContent = user.name;
      document.getElementById("sidebar-role").textContent = user.role || "Student";
    }

    function logout() {
      localStorage.removeItem("mf_token");
      localStorage.removeItem("mf_user");
      window.location.href = "../login.html";
    }

    function toggleDark() {
      document.documentElement.classList.toggle("dark");
      const icon = document.querySelector("#dark-toggle i");
      const isDark = document.documentElement.classList.contains("dark");
      icon.setAttribute("data-lucide", isDark ? "sun" : "moon");
      lucide.createIcons();
    }

    // ── Wizard ──────────────────────────────────────────────────────────────
    const questions = [
      { type:'text',    key:'name',       title:'Before we begin, what should we call you?',                                subtitle:'So the experience feels personal and less robotic.',                          placeholder:'Enter your name' },
      { type:'options', key:'subject',    title: n=>`Great, ${n}. What do you want to learn right now?`,                   subtitle:'Choose the area you want MindForge to tune for first.',                       options:['Programming','Mathematics','Science','Exam Preparation','Other'] },
      { type:'options', key:'level',      title:'How would you rate your current level?',                                   subtitle:'This helps us set the right pace from day one.',                              options:['Beginner','Intermediate','Advanced'] },
      { type:'options', key:'duration',   title:'How long do you prefer learning at a time?',                               subtitle:"We'll shape lessons around your ideal attention window.",                      options:['2–3 min','5–7 min','10+ min'] },
      { type:'options', key:'style',      title:'How do you prefer to learn?',                                              subtitle:'Pick the style that feels most natural to you.',                               options:['Simple explanations','Step-by-step examples','Practice questions','Visual / real-life examples'] },
      { type:'options', key:'difficulty', title:'When learning something new, what do you prefer?',                        subtitle:'We can keep it gentle, balanced, or stretch your thinking.',                   options:['Start easy','Moderate difficulty','Challenge me'] },
      { type:'options', key:'confidence', title:'How confident are you in this subject?',                                   subtitle:'Your confidence helps us calibrate encouragement and review.',                 options:['Not confident','Somewhat confident','Very confident'] }
    ];

    const state = { step:0, answers:{ name:'',subject:'',level:'',duration:'',style:'',difficulty:'',confidence:'' }, completed:false };

    const screen       = document.getElementById('screen');
    const progressBar  = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const stepText     = document.getElementById('stepText');
    const stepHint     = document.getElementById('stepHint');
    const confettiLayer= document.getElementById('confettiLayer');

    function pct() { return state.completed ? 100 : Math.round(((state.step+1)/questions.length)*100); }
    function valid() { const v=state.answers[questions[state.step].key]; return typeof v==='string'?v.trim().length>0:Boolean(v); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

    function render() {
      const p = pct();
      progressBar.style.width = `${p}%`;
      progressText.textContent = `${p}%`;

      if (state.completed) {
        stepText.textContent = 'Profile ready';
        stepHint.textContent = 'MindForge is now tuned for you.';
        renderSuccess(); return;
      }

      const q = questions[state.step];
      stepText.textContent = `Step ${state.step+1} of ${questions.length}`;
      stepHint.textContent = q.type==='text' ? "Let's begin with a quick introduction." : 'Select the option that best matches you.';
      q.type==='text' ? renderText(q) : renderOptions(q);
    }

    function renderText(q) {
      const val = state.answers[q.key];
      screen.className = 'screen-enter';
      screen.innerHTML = `
        <div class="space-y-6">
          <div>
            <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-widest mb-3" style="background:#ede9fe;color:#6C5CE7">Learner onboarding</span>
            <h1 class="text-2xl font-bold text-gray-800 text-main mb-1">${esc(q.title)}</h1>
            <p class="text-sm text-gray-500 text-sub">${esc(q.subtitle)}</p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 text-main mb-2">Your name</label>
            <input id="nameInput" type="text" value="${esc(val)}" placeholder="${esc(q.placeholder)}" autocomplete="given-name"
              class="text-input w-full h-12 rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm text-gray-800 outline-none placeholder:text-gray-400 focus:border-violet-400 focus:bg-white transition" />
          </div>
          <div class="flex items-center justify-between pt-2 border-t border-gray-100">
            <button type="button" class="back-btn min-h-[42px] rounded-xl border border-gray-200 px-5 py-2 text-sm font-semibold text-gray-400 cursor-not-allowed" disabled>Back</button>
            <button data-primary type="button" ${val.trim()?'':'disabled'} class="btn-primary gradient-btn min-h-[42px] rounded-xl px-6 py-2 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5">Continue</button>
          </div>
        </div>`;

      const input = document.getElementById('nameInput');
      const btn   = screen.querySelector('[data-primary]');
      input.addEventListener('input', e => { state.answers.name=e.target.value; btn.disabled=!state.answers.name.trim(); });
      input.addEventListener('keydown', e => { if(e.key==='Enter'&&state.answers.name.trim()) goNext(); });
      btn.addEventListener('click', goNext);
    }

    function renderOptions(q) {
      const selected  = state.answers[q.key];
      const title     = typeof q.title==='function' ? q.title(state.answers.name.trim()||'there') : q.title;
      const finalStep = state.step===questions.length-1;
      screen.className = 'screen-enter';
      screen.innerHTML = `
        <div class="space-y-6">
          <div>
            <h1 class="text-2xl font-bold text-gray-800 text-main mb-1">${title}</h1>
            <p class="text-sm text-gray-500 text-sub">${q.subtitle}</p>
          </div>
          <div class="grid gap-3 ${q.options.length>3?'sm:grid-cols-2':''}">
            ${q.options.map(o=>`
              <button type="button" data-option="${esc(o)}"
                class="option-btn flex items-center justify-between rounded-xl border border-gray-200 bg-white px-4 py-3.5 text-left ${selected===o?'selected':''}">
                <span class="text-sm font-semibold text-gray-800 text-main">${esc(o)}</span>
                <span class="tick flex h-7 w-7 items-center justify-center rounded-full text-white flex-shrink-0" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">
                  <svg viewBox="0 0 20 20" class="h-3.5 w-3.5" fill="none"><path d="M4.5 10.5 8 14l7.5-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
              </button>`).join('')}
          </div>
          <div class="flex items-center justify-between pt-2 border-t border-gray-100">
            <button type="button" data-back class="back-btn min-h-[42px] rounded-xl border border-gray-200 px-5 py-2 text-sm font-semibold text-gray-700 transition hover:bg-gray-50">Back</button>
            <button data-primary type="button" ${selected?'':'disabled'} class="btn-primary gradient-btn min-h-[42px] rounded-xl px-6 py-2 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5">
              ${finalStep?'Create My Profile':'Continue'}
            </button>
          </div>
        </div>`;

      screen.querySelectorAll('[data-option]').forEach(b => b.addEventListener('click', ()=>{ state.answers[q.key]=b.dataset.option; render(); }));
      screen.querySelector('[data-back]').addEventListener('click', goBack);
      screen.querySelector('[data-primary]').addEventListener('click', goNext);
    }

    function renderSuccess() {
      const name = state.answers.name.trim() || 'Learner';
      screen.className = 'screen-enter';
      screen.innerHTML = `
        <div class="flex flex-col items-center justify-center gap-6 py-6 text-center">
          <div class="relative flex h-20 w-20 items-center justify-center rounded-full" style="background:#f0fdf4;box-shadow:0 0 0 12px rgba(22,163,74,0.08)">
            <svg viewBox="0 0 64 64" class="h-14 w-14" fill="none">
              <circle cx="32" cy="32" r="24" stroke="#16a34a" stroke-width="4" opacity="0.18"/>
              <path class="check-path" d="M20 33.5 28.5 42 45 24.5" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="space-y-2">
            <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-widest" style="background:#ede9fe;color:#6C5CE7">Profile complete</span>
            <h1 class="text-2xl font-bold text-gray-800 text-main">You're ready, ${esc(name)}!</h1>
            <p class="text-sm text-gray-500 text-sub">MindForge is now tuned for you.</p>
          </div>
          <button id="goDashboard" class="gradient-btn min-h-[44px] rounded-xl px-8 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5">Go to Dashboard</button>
        </div>`;
      document.getElementById('goDashboard').addEventListener('click', ()=>{ window.location.href="../dashboard.html"; });
      launchConfetti();
    }

    async function goNext() {
      if (!valid()) return;
      if (state.step < questions.length-1) { state.step++; render(); }
      else { await saveProfile(); state.completed=true; render(); }
    }

    function goBack() { if(state.step>0){ state.step--; render(); } }

    async function saveProfile() {
      try {
        const res = await fetch(`${API_BASE}/learner-profiling`, {
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`},
          body: JSON.stringify(state.answers)
        });
        if (!res.ok) console.error("Failed to save profile");
      } catch(e) { console.error("Error saving profile:", e); }
    }

    function launchConfetti() {
      confettiLayer.innerHTML='';
      const colors=['#6C5CE7','#4A90E2','#00B894','#a78bfa','#60a5fa'];
      for(let i=0;i<28;i++){
        const p=document.createElement('span');
        p.className='confetti-piece';
        p.style.left=`${Math.random()*100}%`;
        p.style.background=colors[i%colors.length];
        p.style.transform=`translateY(-12px) rotate(${Math.random()*180}deg)`;
        p.style.animationDelay=`${Math.random()*0.25}s`;
        confettiLayer.appendChild(p);
      }
      setTimeout(()=>{ confettiLayer.innerHTML=''; }, 1900);
    }

    render();
  </script>
</body>
</html>
