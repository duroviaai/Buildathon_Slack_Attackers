<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz — MindForge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f0f2f8; }
    .sidebar { width: 240px; min-width: 240px; }
    .main-area { width: calc(100% - 240px); }
    .gradient-btn { background: linear-gradient(135deg, #6C5CE7, #4A90E2); }
    .nav-item:hover { background: #ede9fe; color: #6C5CE7; }
    .nav-item.active { background: #ede9fe; color: #6C5CE7; font-weight: 600; }
    .dark body { background: #0f0f1a; }
    .dark .sidebar-bg { background: #1a1a2e; }
    .dark .main-bg { background: #0f0f1a; }
    .dark .card-bg { background: #1e1e30; }
    .dark .navbar-bg { background: #1a1a2e; border-color: #2a2a40; }
    .dark .text-main { color: #e2e8f0; }
    .dark .text-sub { color: #94a3b8; }
    .dark .input-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .nav-item:hover { background: #2a2a40; }
    .dark .nav-item.active { background: #2a2a40; }
    .dark .search-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .icon-btn { color: #94a3b8; }
    .dark .sidebar-bottom { border-color: #2a2a40; }
    .dark .fc-input-box { background: #2a2a40; border-color: #3a3a55; }
    .dark .fc-textarea { color: #e2e8f0; }
    .dark .fc-toolbar { border-color: #3a3a55; }
    .dark .count-pill { background: #2a2a40; border-color: #3a3a55; color: #94a3b8; }
    .dark .count-pill:hover { background: #3a2a55; border-color: #6C5CE7; color: #c4b5fd; }
    .dark .count-pill.selected { background: linear-gradient(135deg,rgba(108,92,231,0.4),rgba(74,144,226,0.4)); border-color: #6C5CE7; color: #fff; }
    .dark .upload-btn { background: #2a2a40; border-color: #3a3a55; color: #94a3b8; }
    .dark .upload-btn:hover { background: #3a2a55; border-color: #6C5CE7; }
    .dark .opt-btn { background: #2a2a40; border-color: #3a3a55; color: #94a3b8; }
    .dark .opt-btn:hover { background: #3a2a55; border-color: #6C5CE7; color: #e2e8f0; }

    .count-pill {
      background: #f3f4f6; border: 1px solid #e5e7eb; color: #6b7280;
      cursor: pointer; transition: all 0.15s;
    }
    .count-pill:hover { background: #ede9fe; border-color: #6C5CE7; color: #6C5CE7; }
    .count-pill.selected { background: linear-gradient(135deg,#6C5CE7,#4A90E2); border-color: #6C5CE7; color: #fff; box-shadow: 0 2px 8px rgba(108,92,231,0.3); }

    .upload-btn {
      background: #f9fafb; border: 1px solid #e5e7eb; color: #6b7280; transition: all 0.15s;
    }
    .upload-btn:hover { background: #ede9fe; border-color: #6C5CE7; color: #6C5CE7; }

    .file-chip { background: #ede9fe; border: 1px solid #ddd6fe; color: #6C5CE7; }

    .fc-input-box {
      background: #f9fafb; border: 1px solid #e5e7eb;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .fc-input-box:focus-within { border-color: #6C5CE7; box-shadow: 0 0 0 3px rgba(108,92,231,0.12); }

    .opt-btn {
      background: #f9fafb; border: 1px solid #e5e7eb; color: #374151;
      transition: all 0.15s; text-align: left; width: 100%;
    }
    .opt-btn:hover:not(:disabled) { background: #ede9fe; border-color: #6C5CE7; color: #6C5CE7; }
    .opt-btn.selected { background: #ede9fe; border-color: #6C5CE7; color: #6C5CE7; }
    .opt-btn.correct { background: #dcfce7; border-color: #16a34a; color: #15803d; }
    .opt-btn.wrong   { background: #fee2e2; border-color: #dc2626; color: #dc2626; }

    .progress-bar-fill {
      background: linear-gradient(90deg, #6C5CE7, #4A90E2);
      transition: width 0.4s ease; border-radius: 9999px;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-generate {
      background: linear-gradient(135deg, #6C5CE7, #4A90E2);
      box-shadow: 0 4px 12px rgba(108,92,231,0.3);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-generate:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(108,92,231,0.4); }
    .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
  </style>
</head>
<body class="min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="sidebar sidebar-bg bg-[#f8f9fc] h-screen fixed left-0 top-0 flex flex-col border-r border-gray-200 z-20">
    <div class="flex-1 flex flex-col overflow-y-auto">
      <!-- Logo -->
      <div class="px-5 py-5 flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <span class="text-xl font-extrabold tracking-tight text-gray-800">Mind<span style="color:#6C5CE7">Forge</span></span>
      </div>
      <!-- Nav -->
      <nav class="px-3 space-y-0.5">
        <a href="../dashboard.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="home" class="w-4 h-4"></i> Home
        </a>
        <a href="notes.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="library" class="w-4 h-4"></i> Your Library
        </a>
        <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="bell" class="w-4 h-4"></i> Notifications
        </a>
        <a href="#" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="folder" class="w-4 h-4"></i> Folders
        </a>
        <a href="flashcards.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="layers" class="w-4 h-4"></i> Flashcards
        </a>
        <a href="notes.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="book-open" class="w-4 h-4"></i> Study Guides
        </a>
        <a href="quiz.html" class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 transition cursor-pointer">
          <i data-lucide="clipboard-list" class="w-4 h-4"></i> Quiz
        </a>
      </nav>
      <div class="px-4 mt-6 space-y-3">
        <button class="gradient-btn w-full py-2.5 rounded-xl text-white font-semibold text-sm flex items-center justify-center gap-2 shadow-md hover:opacity-90 transition">
          <i data-lucide="plus" class="w-4 h-4"></i> New Chat
        </button>
      </div>
    </div>
    <!-- Bottom -->
    <div class="mt-auto sidebar-bottom border-t border-gray-200 px-4 py-4 space-y-1">
      <a href="#" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 transition cursor-pointer">
        <i data-lucide="file-text" class="w-4 h-4"></i> Terms
      </a>
      <a href="#" onclick="logout()" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-gray-500 transition cursor-pointer">
        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
      </a>
      <div class="flex items-center gap-3 pt-4 mt-2 border-t border-gray-200">
        <div id="sidebar-avatar" class="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">M</div>
        <div class="overflow-hidden">
          <p id="sidebar-name" class="text-sm font-semibold text-gray-800 truncate text-main">User</p>
          <p id="sidebar-role" class="text-xs text-gray-400">Student</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area ml-[240px] flex flex-col min-h-screen">

    <!-- TOP NAVBAR -->
    <header class="navbar-bg bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 sticky top-0 z-10">
      <div class="flex-1 relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" placeholder="Search quizzes..."
          class="search-bg w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-300 transition" />
      </div>
      <div class="flex items-center gap-3">
        <button id="dark-toggle" onclick="toggleDark()" class="icon-btn p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition" title="Toggle dark mode">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button class="icon-btn relative p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition">
          <i data-lucide="bell" class="w-5 h-5"></i>
        </button>
        <div id="user-avatar" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">M</div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="main-bg flex-1 p-6 space-y-6 overflow-y-auto">

      <!-- Page Header -->
      <div>
        <h1 class="text-2xl font-extrabold text-gray-800 text-main">Quiz</h1>
        <p class="text-sm text-gray-500 text-sub mt-0.5">Test your knowledge with AI-generated quizzes</p>
      </div>

      <!-- Input Card -->
      <div class="card-bg bg-white rounded-2xl shadow-sm border border-gray-100 p-6">

        <!-- Notes / File -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-gray-700 text-main mb-2">Notes / File</label>
          <div class="fc-input-box rounded-xl overflow-hidden">
            <textarea id="notes-input" rows="5"
              placeholder="Paste your notes here and the AI will generate a quiz, or attach a file below..."
              class="fc-textarea w-full px-4 pt-4 pb-2 bg-transparent text-gray-800 placeholder-gray-400 text-sm resize-none focus:outline-none text-main"></textarea>
            <div class="fc-toolbar flex items-center gap-3 px-3 pb-3 pt-1 border-t border-gray-100">
              <input type="file" id="file-input" class="hidden" accept=".txt,.pdf,.doc,.docx" />
              <label for="file-input" class="upload-btn flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer">
                <i data-lucide="paperclip" class="w-3.5 h-3.5"></i> Attach file
              </label>
              <span id="file-chip" class="hidden file-chip items-center gap-2 px-3 py-1.5 rounded-lg text-xs">
                <i data-lucide="file-text" class="w-3.5 h-3.5"></i>
                <span id="file-name"></span>
                <button id="file-clear" class="text-gray-400 hover:text-red-500 ml-1">✕</button>
              </span>
            </div>
          </div>
        </div>

        <!-- Count + Generate -->
        <div class="flex items-end justify-between gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 text-main mb-2">Number of Questions</label>
            <div class="flex flex-wrap gap-2" id="count-picker">
              <button type="button" data-value="5"  class="count-pill px-4 py-1.5 rounded-lg text-sm font-semibold">5</button>
              <button type="button" data-value="10" class="count-pill selected px-4 py-1.5 rounded-lg text-sm font-semibold">10</button>
              <button type="button" data-value="15" class="count-pill px-4 py-1.5 rounded-lg text-sm font-semibold">15</button>
              <button type="button" data-value="20" class="count-pill px-4 py-1.5 rounded-lg text-sm font-semibold">20</button>
            </div>
            <input type="hidden" id="question-count" value="10" />
          </div>
          <button id="generate-btn" class="btn-generate px-7 py-2.5 rounded-xl text-white font-semibold text-sm flex items-center gap-2 flex-shrink-0">
            <span id="btn-text">Generate Quiz</span>
            <span id="btn-spinner" class="hidden"><span class="spinner"></span></span>
            <i id="btn-icon" data-lucide="zap" class="w-4 h-4"></i>
          </button>
        </div>

        <p id="error-msg" class="hidden mt-4 text-sm text-red-500 bg-red-50 border border-red-200 rounded-lg px-4 py-3"></p>
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="card-bg bg-white rounded-2xl shadow-sm border border-gray-100 py-16 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-violet-50 border border-violet-200 mb-4">
          <i data-lucide="clipboard-list" class="w-8 h-8 text-violet-500"></i>
        </div>
        <h3 class="text-base font-bold text-gray-700 text-main mb-1">No Quiz Yet</h3>
        <p class="text-sm text-gray-400 text-sub max-w-sm mx-auto">Paste your notes or upload a file above, then click "Generate Quiz" to get started.</p>
      </div>

    </main>
  </div>

  <script src="../assets/js/quiz.js"></script>
  <script>
    lucide.createIcons();

    const token = localStorage.getItem("mf_token");
    if (!token) window.location.href = "../login.html";

    const user = JSON.parse(localStorage.getItem("mf_user") || "null");
    const initial = user ? user.name.charAt(0).toUpperCase() : "M";
    document.getElementById("user-avatar").textContent = initial;
    document.getElementById("sidebar-avatar").textContent = initial;
    if (user) {
      document.getElementById("sidebar-name").textContent = user.name;
      document.getElementById("sidebar-role").textContent = user.role || "Student";
    }

    function logout() {
      localStorage.removeItem("mf_token");
      localStorage.removeItem("mf_user");
      window.location.href = "../login.html";
    }

    function toggleDark() {
      document.documentElement.classList.toggle("dark");
      const icon = document.querySelector("#dark-toggle i");
      const isDark = document.documentElement.classList.contains("dark");
      icon.setAttribute("data-lucide", isDark ? "sun" : "moon");
      lucide.createIcons();
    }
  </script>
</body>
</html>
