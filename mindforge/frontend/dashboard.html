<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — MindForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { background: #0a0a0f; }
  </style>
</head>
<body class="min-h-screen text-white">

  <!-- Navbar -->
  <nav class="border-b border-white/10 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <!-- Avatar (populated by JS) -->
      <div id="user-avatar"
        class="w-9 h-9 rounded-full bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center font-bold text-sm">
      </div>
      <span class="text-2xl font-extrabold tracking-tight">MIND<span class="text-violet-400">FORGE</span></span>
    </div>
    <div class="flex items-center gap-4">
      <span id="user-greeting" class="text-sm text-gray-400"></span>
      <button onclick="logout()"
        class="text-sm px-4 py-1.5 rounded-lg border border-white/10 hover:border-violet-500/50 hover:text-violet-400 transition-colors">
        Logout
      </button>
    </div>
  </nav>

  <!-- Content -->
  <main class="max-w-4xl mx-auto px-6 py-16 text-center">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-violet-500/10 border border-violet-500/20 text-violet-400 text-xs font-medium mb-6">
      ✓ Authenticated
    </div>
    <h1 class="text-4xl font-extrabold mb-4">Welcome to <span class="text-violet-400">MindForge</span></h1>
    <p class="text-gray-400 text-lg">Your AI-powered learning dashboard is ready.</p>
  </main>

  <script>
    const user = JSON.parse(localStorage.getItem("mf_user") || "null");
    if (!user) { window.location.href = "login.html"; }
    else {
      document.getElementById("user-avatar").textContent = user.name.charAt(0).toUpperCase();
      document.getElementById("user-greeting").textContent = `${user.name} · ${user.role}`;
    }
    function logout() {
      localStorage.removeItem("mf_token");
      localStorage.removeItem("mf_user");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
