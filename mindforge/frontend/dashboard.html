<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — MindForge</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f0f2f8; }
    .sidebar { width: 240px; min-width: 240px; }
    .main-area { width: calc(100% - 240px); }
    .gradient-progress { background: linear-gradient(90deg, #6C5CE7, #4A90E2, #00B894); }
    .gradient-card { background: linear-gradient(135deg, #6C5CE7 0%, #4A90E2 55%, #00B894 100%); }
    .gradient-btn { background: linear-gradient(135deg, #6C5CE7, #4A90E2); }
    .nav-item:hover { background: #ede9fe; color: #6C5CE7; }
    .nav-item.active { background: #ede9fe; color: #6C5CE7; font-weight: 600; }
    .chat-scroll { max-height: 320px; overflow-y: auto; scroll-behavior: smooth; }
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 4px; }
    .chat-card { transition: all 0.3s ease; }
    .chat-card.expanded { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 50; background: white; border-radius: 0; display: flex; flex-direction: column; padding: 0; margin: 0; }
    .chat-card.expanded .chat-scroll { max-height: none; flex: 1; overflow-y: auto; }
    .chat-card.expanded .chat-scroll > div { max-width: 900px; margin: 0 auto; width: 100%; }
    .dark .chat-card.expanded { background: #0f0f1a; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg-animate { animation: fadeSlideIn 0.25s ease forwards; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .dark body { background: #0f0f1a; }
    .dark .sidebar-bg { background: #1a1a2e; }
    .dark .main-bg { background: #0f0f1a; }
    .dark .card-bg { background: #1e1e30; }
    .dark .navbar-bg { background: #1a1a2e; border-color: #2a2a40; }
    .dark .text-main { color: #e2e8f0; }
    .dark .text-sub { color: #94a3b8; }
    .dark .input-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .nav-item:hover { background: #2a2a40; }
    .dark .nav-item.active { background: #2a2a40; }
    .dark .search-bg { background: #2a2a40; border-color: #3a3a55; color: #e2e8f0; }
    .dark .icon-btn { color: #94a3b8; }
    .dark .sidebar-bottom { border-color: #2a2a40; }
    .dark .flashcard-bg { background: #1e1e30; }

    /* Learner Profiling Modal */
    #profileModal { display:none; position:fixed; inset:0; z-index:100; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
    #profileModal.open { display:flex; }
    .option-btn { transition: all 180ms ease; }
    .option-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(108,92,231,0.12); }
    .option-btn.selected { border-color: #6C5CE7; background: rgba(108,92,231,0.06); box-shadow: 0 8px 24px rgba(108,92,231,0.15); }
    .option-btn.selected .tick { opacity: 1; transform: scale(1); }
    .tick { opacity: 0; transform: scale(0.8); transition: all 180ms ease; }
    .progress-bar { transition: width 420ms cubic-bezier(0.16,1,0.3,1); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }
    .screen-enter { animation: fadeSlideIn 0.35s ease forwards; }
    @keyframes fadeSlideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .check-path { stroke-dasharray:100; stroke-dashoffset:100; animation: drawCheck 0.8s ease forwards 0.25s; }
    @keyframes drawCheck { 0%{stroke-dashoffset:100} 100%{stroke-dashoffset:0} }
    .confetti-piece { position:absolute; top:0; width:10px; height:16px; border-radius:999px; animation: confettiFall 1.6s ease-out forwards; }
    @keyframes confettiFall { 0%{opacity:1;transform:translateY(-10px) rotate(0deg)} 100%{opacity:0;transform:translateY(220px) rotate(540deg)} }
  </style>
</head>
<body class="min-h-screen flex">

  <div id="app-sidebar"></div>

  <!-- RIGHT SIDE -->
  <div id="main" class="main-area flex flex-col min-h-screen">

    <!-- TOP NAVBAR -->
    <header class="navbar-bg bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-4 sticky top-0 z-10">
      <!-- Search -->
      <div class="flex-1 relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" placeholder="Search for practice tests"
          class="search-bg w-full bg-gray-50 border border-gray-200 rounded-xl pl-10 pr-4 py-2.5 text-sm text-gray-700 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-violet-300 transition" />
      </div>
      <!-- Right Icons -->
      <div class="flex items-center gap-3">
        <button id="dark-toggle" onclick="toggleDark()" class="icon-btn p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition" title="Toggle dark mode">
          <i data-lucide="moon" class="w-5 h-5"></i>
        </button>
        <button class="icon-btn relative p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-[9px] font-bold rounded-full flex items-center justify-center">3</span>
        </button>
        <div id="user-avatar" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)"></div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="main-bg flex-1 p-6 space-y-6 overflow-y-auto">

      <!-- A. PROGRESS CARD -->
      <div class="gradient-card rounded-2xl p-6 shadow-lg text-white relative overflow-hidden">
        <div class="absolute inset-0 opacity-10" style="background:radial-gradient(circle at 80% 20%, white 0%, transparent 60%)"></div>
        <div class="relative z-10">
          <div class="flex items-center gap-2 mb-1">
            <i data-lucide="zap" class="w-5 h-5 text-yellow-300"></i>
            <span class="text-xs font-semibold uppercase tracking-widest text-white/70">Progress</span>
          </div>
          <h2 class="text-xl font-bold mb-4 max-w-lg leading-snug">Practice terms using different question formats</h2>
          <div class="flex items-center gap-4">
            <div class="flex-1 bg-white/20 rounded-full h-3 overflow-hidden">
              <div class="h-3 rounded-full bg-white/90 transition-all duration-700" style="width:75%"></div>
            </div>
            <span class="text-sm font-semibold whitespace-nowrap">75% Complete</span>
          </div>
          <div class="mt-4 flex gap-3">
            <button class="bg-white/20 hover:bg-white/30 text-white text-sm font-medium px-4 py-2 rounded-lg transition">Continue</button>
            <button class="bg-white/10 hover:bg-white/20 text-white text-sm px-4 py-2 rounded-lg transition">View Details</button>
          </div>
        </div>
      </div>

      <!-- B. AI CHAT CARD -->
      <div id="chatCard" class="chat-card card-bg bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <!-- Card Header -->
        <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
          <div class="w-full max-w-[900px] mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#6C5CE7,#00B894)">
                <i data-lucide="sparkles" class="w-4 h-4 text-white"></i>
              </div>
              <span class="font-bold text-gray-800 text-main">MindForge Pro</span>
              <span class="text-xs bg-violet-100 text-violet-600 font-semibold px-2 py-0.5 rounded-full">AI</span>
            </div>
            <button id="expandBtn" class="text-xs text-gray-400 hover:text-gray-600 transition flex items-center gap-1">
              <i data-lucide="maximize-2" class="w-3.5 h-3.5"></i> <span id="expandLabel">Expand</span>
            </button>
          </div>
        </div>

        <!-- Chat Messages -->
        <div id="chatContainer" class="chat-scroll px-5 py-4 bg-gray-50/50">
          <div class="msg-wrapper max-w-[900px] mx-auto space-y-3">
            <div class="flex items-start gap-2.5 msg-animate">
              <div class="w-7 h-7 rounded-full flex-shrink-0 flex items-center justify-center" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">
                <i data-lucide="bot" class="w-4 h-4 text-white"></i>
              </div>
              <div class="bg-slate-700 text-white px-4 py-3 rounded-xl max-w-[70%] text-sm leading-relaxed whitespace-pre-line shadow-sm">
                Hi! I'm MindForge AI. Ask me anything.
              </div>
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="px-5 py-4 border-t border-gray-100 bg-white flex-shrink-0">
          <div class="max-w-[900px] mx-auto">
            <input id="fileInput" type="file" class="hidden" accept="image/*,.pdf,.txt,.md,.csv,.py,.js,.ts,.html,.css,.json" />
            <div class="input-bg flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2">
              <input id="chatInput" type="text" placeholder="Ask anything or attach a file…"
                class="flex-1 bg-transparent text-sm text-gray-700 placeholder-gray-400 focus:outline-none text-main" />
              <div class="flex items-center gap-1.5 flex-shrink-0">
                <button id="attachBtn" class="icon-btn p-1.5 rounded-lg hover:bg-gray-200 text-gray-400 transition" title="Attach file or photo">
                  <i data-lucide="paperclip" class="w-4 h-4"></i>
                </button>
                <button id="micBtn" class="icon-btn p-1.5 rounded-lg hover:bg-gray-200 text-gray-400 transition" title="Voice to text">
                  <i data-lucide="mic" class="w-4 h-4"></i>
                </button>
                <button id="ttsBtn" class="icon-btn p-1.5 rounded-lg hover:bg-gray-200 text-gray-400 transition" title="Voice reply OFF">
                  <i data-lucide="volume-2" class="w-4 h-4"></i>
                </button>
                <button id="sendBtn" class="p-1.5 rounded-lg text-white transition hover:opacity-90" style="background:#00B894" title="Send">
                  <i data-lucide="send" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- C. POPULAR FLASHCARD SETS -->
      <div>
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-base font-bold text-gray-800 text-main">Popular flashcard sets</h3>
          <a href="#" class="text-sm font-medium hover:underline" style="color:#6C5CE7">View all</a>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Card 1 -->
          <div class="flashcard-bg card-bg bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer group">
            <div class="w-10 h-10 rounded-xl mb-3 flex items-center justify-center" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">
              <i data-lucide="atom" class="w-5 h-5 text-white"></i>
            </div>
            <h4 class="font-semibold text-gray-800 text-sm mb-1 text-main">Biology Fundamentals</h4>
            <p class="text-xs text-gray-400 text-sub mb-3">120 terms · 4.8 ★</p>
            <div class="w-full bg-gray-100 rounded-full h-1.5">
              <div class="h-1.5 rounded-full" style="width:60%;background:linear-gradient(90deg,#6C5CE7,#4A90E2)"></div>
            </div>
          </div>
          <!-- Card 2 -->
          <div class="flashcard-bg card-bg bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer group">
            <div class="w-10 h-10 rounded-xl mb-3 flex items-center justify-center" style="background:linear-gradient(135deg,#4A90E2,#00B894)">
              <i data-lucide="calculator" class="w-5 h-5 text-white"></i>
            </div>
            <h4 class="font-semibold text-gray-800 text-sm mb-1 text-main">Calculus II</h4>
            <p class="text-xs text-gray-400 text-sub mb-3">85 terms · 4.6 ★</p>
            <div class="w-full bg-gray-100 rounded-full h-1.5">
              <div class="h-1.5 rounded-full" style="width:40%;background:linear-gradient(90deg,#4A90E2,#00B894)"></div>
            </div>
          </div>
          <!-- Card 3 -->
          <div class="flashcard-bg card-bg bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer group">
            <div class="w-10 h-10 rounded-xl mb-3 flex items-center justify-center" style="background:linear-gradient(135deg,#00B894,#6C5CE7)">
              <i data-lucide="globe-2" class="w-5 h-5 text-white"></i>
            </div>
            <h4 class="font-semibold text-gray-800 text-sm mb-1 text-main">World History</h4>
            <p class="text-xs text-gray-400 text-sub mb-3">200 terms · 4.9 ★</p>
            <div class="w-full bg-gray-100 rounded-full h-1.5">
              <div class="h-1.5 rounded-full" style="width:80%;background:linear-gradient(90deg,#00B894,#6C5CE7)"></div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Learner Profiling Modal -->
  <div id="profileModal">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 overflow-hidden relative" style="max-height:90vh;overflow-y:auto">
      <!-- Modal Header -->
      <div class="px-6 pt-6 pb-4 border-b border-gray-100">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs font-semibold text-gray-400" id="m-stepText">Step 1 of 7</span>
          <span class="text-xs font-semibold border border-gray-200 bg-gray-50 rounded-full px-3 py-0.5 text-gray-500" id="m-progressText">14%</span>
        </div>
        <div class="bg-gray-100 rounded-full h-2 overflow-hidden">
          <div id="m-progressBar" class="h-2 rounded-full progress-bar" style="width:14%;background:linear-gradient(90deg,#6C5CE7,#4A90E2)"></div>
        </div>
      </div>
      <!-- Modal Body -->
      <div class="px-6 py-6 relative">
        <div id="m-confetti" class="pointer-events-none absolute inset-0 overflow-hidden"></div>
        <div id="m-screen" class="screen-enter"></div>
      </div>
    </div>
  </div>

  <script src="assets/js/chatbot.js" defer></script>
  <script src="assets/js/sidebar.js"></script>
  <script>
    // Auth guard
    const token = localStorage.getItem("mf_token");
    if (!token) window.location.href = "login.html";

    lucide.createIcons();

    const user = JSON.parse(localStorage.getItem("mf_user") || "null");
    const initial = user ? user.name.charAt(0).toUpperCase() : "M";
    document.getElementById("user-avatar").textContent = initial;

    // Dark mode toggle
    function toggleDark() {
      document.documentElement.classList.toggle("dark");
      const icon = document.querySelector("#dark-toggle i");
      const isDark = document.documentElement.classList.contains("dark");
      icon.setAttribute("data-lucide", isDark ? "sun" : "moon");
      lucide.createIcons();
    }

    // ── Learner Profiling Wizard ──────────────────────────────────────────
    const API_BASE = "http://127.0.0.1:5000/api";

    // Check if profile exists; show modal if not
    fetch(`${API_BASE}/learner-profiling`, { headers: { "Authorization": `Bearer ${token}` } })
      .then(r => { if (!r.ok) openProfileModal(); })
      .catch(() => {});

    function openProfileModal() {
      document.getElementById('profileModal').classList.add('open');
      pRender();
    }

    const pQuestions = [
      { type:'text',    key:'name',       title:'Before we begin, what should we call you?',                          subtitle:'So the experience feels personal and less robotic.',             placeholder:'Enter your name' },
      { type:'options', key:'subject',    title: n=>`Great, ${n}. What do you want to learn right now?`,             subtitle:'Choose the area you want MindForge to tune for first.',          options:['Programming','Mathematics','Science','Exam Preparation','Other'] },
      { type:'options', key:'level',      title:'How would you rate your current level?',                             subtitle:'This helps us set the right pace from day one.',                 options:['Beginner','Intermediate','Advanced'] },
      { type:'options', key:'duration',   title:'How long do you prefer learning at a time?',                         subtitle:"We'll shape lessons around your ideal attention window.",          options:['2–3 min','5–7 min','10+ min'] },
      { type:'options', key:'style',      title:'How do you prefer to learn?',                                        subtitle:'Pick the style that feels most natural to you.',                  options:['Simple explanations','Step-by-step examples','Practice questions','Visual / real-life examples'] },
      { type:'options', key:'difficulty', title:'When learning something new, what do you prefer?',                  subtitle:'We can keep it gentle, balanced, or stretch your thinking.',      options:['Start easy','Moderate difficulty','Challenge me'] },
      { type:'options', key:'confidence', title:'How confident are you in this subject?',                             subtitle:'Your confidence helps us calibrate encouragement and review.',     options:['Not confident','Somewhat confident','Very confident'] }
    ];

    const pState = { step:0, answers:{ name:'',subject:'',level:'',duration:'',style:'',difficulty:'',confidence:'' }, completed:false };
    const mScreen = () => document.getElementById('m-screen');
    const mBar    = () => document.getElementById('m-progressBar');
    const mPct    = () => document.getElementById('m-progressText');
    const mStep   = () => document.getElementById('m-stepText');

    function pPct() { return pState.completed ? 100 : Math.round(((pState.step+1)/pQuestions.length)*100); }
    function pValid() { const v=pState.answers[pQuestions[pState.step].key]; return typeof v==='string'?v.trim().length>0:Boolean(v); }
    function pEsc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }

    function pRender() {
      const p = pPct();
      mBar().style.width = `${p}%`;
      mPct().textContent = `${p}%`;
      if (pState.completed) { mStep().textContent='Profile ready'; pRenderSuccess(); return; }
      const q = pQuestions[pState.step];
      mStep().textContent = `Step ${pState.step+1} of ${pQuestions.length}`;
      q.type==='text' ? pRenderText(q) : pRenderOptions(q);
    }

    function pRenderText(q) {
      const val = pState.answers[q.key];
      const s = mScreen(); s.className='screen-enter';
      s.innerHTML = `
        <div class="space-y-5">
          <div>
            <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-widest mb-3" style="background:#ede9fe;color:#6C5CE7">Learner onboarding</span>
            <h2 class="text-xl font-bold text-gray-800 mb-1">${pEsc(q.title)}</h2>
            <p class="text-sm text-gray-500">${pEsc(q.subtitle)}</p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Your name</label>
            <input id="p-nameInput" type="text" value="${pEsc(val)}" placeholder="${pEsc(q.placeholder)}"
              class="w-full h-11 rounded-xl border border-gray-200 bg-gray-50 px-4 text-sm text-gray-800 outline-none placeholder:text-gray-400 focus:border-violet-400 focus:bg-white transition" />
          </div>
          <div class="flex items-center justify-between pt-2 border-t border-gray-100">
            <button class="min-h-[40px] rounded-xl border border-gray-200 px-5 py-2 text-sm font-semibold text-gray-400 cursor-not-allowed" disabled>Back</button>
            <button id="p-nextBtn" ${val.trim()?'':'disabled'} class="btn-primary min-h-[40px] rounded-xl px-6 py-2 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">Continue</button>
          </div>
        </div>`;
      const inp = document.getElementById('p-nameInput');
      const btn = document.getElementById('p-nextBtn');
      inp.addEventListener('input', e => { pState.answers.name=e.target.value; btn.disabled=!pState.answers.name.trim(); });
      inp.addEventListener('keydown', e => { if(e.key==='Enter'&&pState.answers.name.trim()) pNext(); });
      btn.addEventListener('click', pNext);
    }

    function pRenderOptions(q) {
      const selected = pState.answers[q.key];
      const title = typeof q.title==='function' ? q.title(pState.answers.name.trim()||'there') : q.title;
      const finalStep = pState.step===pQuestions.length-1;
      const s = mScreen(); s.className='screen-enter';
      s.innerHTML = `
        <div class="space-y-5">
          <div>
            <h2 class="text-xl font-bold text-gray-800 mb-1">${title}</h2>
            <p class="text-sm text-gray-500">${q.subtitle}</p>
          </div>
          <div class="grid gap-2.5 ${q.options.length>3?'grid-cols-2':''}">
            ${q.options.map(o=>`
              <button type="button" data-option="${pEsc(o)}"
                class="option-btn flex items-center justify-between rounded-xl border border-gray-200 bg-white px-4 py-3 text-left ${selected===o?'selected':''}">
                <span class="text-sm font-semibold text-gray-800">${pEsc(o)}</span>
                <span class="tick flex h-6 w-6 items-center justify-center rounded-full text-white flex-shrink-0" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">
                  <svg viewBox="0 0 20 20" class="h-3 w-3" fill="none"><path d="M4.5 10.5 8 14l7.5-8" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
              </button>`).join('')}
          </div>
          <div class="flex items-center justify-between pt-2 border-t border-gray-100">
            <button data-back class="min-h-[40px] rounded-xl border border-gray-200 px-5 py-2 text-sm font-semibold text-gray-700 transition hover:bg-gray-50">Back</button>
            <button data-primary ${selected?'':'disabled'} class="btn-primary min-h-[40px] rounded-xl px-6 py-2 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">
              ${finalStep?'Create My Profile':'Continue'}
            </button>
          </div>
        </div>`;
      s.querySelectorAll('[data-option]').forEach(b => b.addEventListener('click', ()=>{ pState.answers[q.key]=b.dataset.option; pRender(); }));
      s.querySelector('[data-back]').addEventListener('click', ()=>{ if(pState.step>0){ pState.step--; pRender(); } });
      s.querySelector('[data-primary]').addEventListener('click', pNext);
    }

    function pRenderSuccess() {
      const name = pState.answers.name.trim() || 'Learner';
      const s = mScreen(); s.className='screen-enter';
      s.innerHTML = `
        <div class="flex flex-col items-center justify-center gap-5 py-4 text-center">
          <div class="relative flex h-16 w-16 items-center justify-center rounded-full" style="background:#f0fdf4;box-shadow:0 0 0 10px rgba(22,163,74,0.08)">
            <svg viewBox="0 0 64 64" class="h-12 w-12" fill="none">
              <circle cx="32" cy="32" r="24" stroke="#16a34a" stroke-width="4" opacity="0.18"/>
              <path class="check-path" d="M20 33.5 28.5 42 45 24.5" stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="space-y-1">
            <span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-widest" style="background:#ede9fe;color:#6C5CE7">Profile complete</span>
            <h2 class="text-xl font-bold text-gray-800">You're ready, ${pEsc(name)}!</h2>
            <p class="text-sm text-gray-500">MindForge is now tuned for you.</p>
          </div>
          <button id="p-closeBtn" class="min-h-[42px] rounded-xl px-8 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:-translate-y-0.5" style="background:linear-gradient(135deg,#6C5CE7,#4A90E2)">Start Learning</button>
        </div>`;
      document.getElementById('p-closeBtn').addEventListener('click', () => {
        document.getElementById('profileModal').classList.remove('open');
      });
      pLaunchConfetti();
    }

    async function pNext() {
      if (!pValid()) return;
      if (pState.step < pQuestions.length-1) { pState.step++; pRender(); }
      else { await pSave(); pState.completed=true; pRender(); }
    }

    async function pSave() {
      try {
        await fetch(`${API_BASE}/learner-profiling`, {
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`},
          body: JSON.stringify(pState.answers)
        });
      } catch(e) { console.error(e); }
    }

    function pLaunchConfetti() {
      const layer = document.getElementById('m-confetti');
      layer.innerHTML='';
      const colors=['#6C5CE7','#4A90E2','#00B894','#a78bfa','#60a5fa'];
      for(let i=0;i<24;i++){
        const p=document.createElement('span'); p.className='confetti-piece';
        p.style.left=`${Math.random()*100}%`;
        p.style.background=colors[i%colors.length];
        p.style.transform=`translateY(-12px) rotate(${Math.random()*180}deg)`;
        p.style.animationDelay=`${Math.random()*0.25}s`;
        layer.appendChild(p);
      }
      setTimeout(()=>{ layer.innerHTML=''; }, 1900);
    }
    // ── End Learner Profiling Wizard ─────────────────────────────────────────

    // Sidebar active nav
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", function(e) {
        if (this.getAttribute("onclick")) return;
        document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
        this.classList.add("active");
      });
    });
  </script>
</body>
</html>
