<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MindForge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }

    body { background: #0a0a0f; }

    .glow-border {
      border: 1px solid rgba(139, 92, 246, 0.35);
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.08), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .input-field {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: rgba(139, 92, 246, 0.7);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Orb background */
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px);
      pointer-events: none; z-index: 0;
    }

    /* Avatar animation */
    #avatar-anim {
      position: fixed; z-index: 50;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700; color: white;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1.4);
      transition: top 0.9s cubic-bezier(.4,0,.2,1),
                  left 0.9s cubic-bezier(.4,0,.2,1),
                  transform 0.9s cubic-bezier(.4,0,.2,1);
    }
    #avatar-anim.avatar-fly {
      top: 20px; left: 20px;
      transform: translate(0, 0) scale(1);
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 relative overflow-hidden">

  <!-- Background orbs -->
  <div class="orb w-96 h-96 bg-violet-700 opacity-20" style="top:-80px;left:-80px;"></div>
  <div class="orb w-80 h-80 bg-indigo-600 opacity-15" style="bottom:-60px;right:-60px;"></div>

  <!-- Avatar animation element (hidden until login success) -->
  <div id="avatar-anim" class="hidden">
    <span id="avatar-letter"></span>
  </div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-2 mb-3">
        <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </div>
        <span class="text-2xl font-extrabold text-white tracking-tight">MIND<span class="text-violet-400">FORGE</span></span>
      </div>
      <p class="text-gray-400 text-sm">Welcome back. Sign in to continue.</p>
    </div>

    <!-- Flash message (registered) -->
    <div id="flash-msg" class="hidden mb-4 px-4 py-3 rounded-lg bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm text-center">
      ✓ Account created! Please log in.
    </div>

    <!-- Form card -->
    <div class="glow-border rounded-2xl p-8 bg-white/[0.03] backdrop-blur-sm">
      <h1 class="text-xl font-bold text-white mb-6">Sign in to your account</h1>

      <form id="login-form" novalidate class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email"
            class="input-field w-full px-4 py-2.5 rounded-lg text-white placeholder-gray-500 text-sm" />
          <p id="err-email" class="hidden mt-1 text-xs text-red-400"></p>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
          <div class="relative">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"
              class="input-field w-full px-4 py-2.5 rounded-lg text-white placeholder-gray-500 text-sm pr-10" />
            <button type="button" onclick="togglePwd('password', this)"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p id="err-password" class="hidden mt-1 text-xs text-red-400"></p>
        </div>

        <!-- Form-level error -->
        <p id="err-form" class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-3 py-2"></p>

        <!-- Submit -->
        <button id="submit-btn" type="submit"
          class="btn-primary w-full py-2.5 rounded-lg text-white font-semibold text-sm flex items-center justify-center gap-2">
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner hidden"><span class="spinner"></span></span>
        </button>

      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        Don't have an account?
        <a href="signup.html" class="text-violet-400 hover:text-violet-300 font-medium transition-colors">Create one</a>
      </p>
    </div>
  </div>

  <script>
    function togglePwd(id, btn) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }
  </script>
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
