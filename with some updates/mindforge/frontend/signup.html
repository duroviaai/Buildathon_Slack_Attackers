<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up — MindForge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");
      * {
        font-family: "Inter", sans-serif;
      }

      body {
        background: #0a0a0f;
      }

      .glow-border {
        border: 1px solid rgba(139, 92, 246, 0.35);
        box-shadow:
          0 0 30px rgba(139, 92, 246, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }
      .input-field {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .input-field:focus {
        outline: none;
        border-color: rgba(139, 92, 246, 0.7);
        box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
      }
      .btn-primary {
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .btn-primary:hover:not(:disabled) {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        z-index: 0;
      }

      .role-option input[type="radio"] {
        display: none;
      }
      .role-option label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-radius: 10px;
        cursor: pointer;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        color: #9ca3af;
        font-size: 0.875rem;
        font-weight: 500;
        transition: all 0.2s;
      }
      .role-option input:checked + label {
        border-color: rgba(139, 92, 246, 0.7);
        background: rgba(139, 92, 246, 0.12);
        color: #c4b5fd;
      }

      .spinner {
        width: 18px;
        height: 18px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Password strength bar */
      #strength-bar {
        transition:
          width 0.3s,
          background-color 0.3s;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center px-4 py-10 relative overflow-hidden"
  >
    <!-- Background orbs -->
    <div
      class="orb w-96 h-96 bg-violet-700 opacity-20"
      style="top: -80px; right: -80px"
    ></div>
    <div
      class="orb w-80 h-80 bg-indigo-600 opacity-15"
      style="bottom: -60px; left: -60px"
    ></div>

    <div class="relative z-10 w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 mb-3">
          <div
            class="w-9 h-9 rounded-lg bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center"
          >
            <svg
              class="w-5 h-5 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"
              />
            </svg>
          </div>
          <span class="text-2xl font-extrabold text-white tracking-tight"
            >MIND<span class="text-violet-400">FORGE</span></span
          >
        </div>
        <p class="text-gray-400 text-sm">
          Create your account and start learning.
        </p>
      </div>

      <!-- Form card -->
      <div class="glow-border rounded-2xl p-8 bg-white/[0.03] backdrop-blur-sm">
        <h1 class="text-xl font-bold text-white mb-6">Create your account</h1>

        <form id="signup-form" novalidate class="space-y-5">
          <!-- Full Name -->
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5"
              >Full Name</label
            >
            <input
              id="name"
              type="text"
              placeholder="Jane Doe"
              autocomplete="name"
              class="input-field w-full px-4 py-2.5 rounded-lg text-white placeholder-gray-500 text-sm"
            />
            <p id="err-name" class="hidden mt-1 text-xs text-red-400"></p>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5"
              >Email</label
            >
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
              class="input-field w-full px-4 py-2.5 rounded-lg text-white placeholder-gray-500 text-sm"
            />
            <p id="err-email" class="hidden mt-1 text-xs text-red-400"></p>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5"
              >Password</label
            >
            <div class="relative">
              <input
                id="password"
                type="password"
                placeholder="Min. 6 characters"
                autocomplete="new-password"
                oninput="updateStrength(this.value)"
                class="input-field w-full px-4 py-2.5 rounded-lg text-white placeholder-gray-500 text-sm pr-10"
              />
              <button
                type="button"
                onclick="togglePwd('password')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
            </div>
            <!-- Strength bar -->
            <div
              class="mt-2 h-1 w-full bg-white/10 rounded-full overflow-hidden"
            >
              <div
                id="strength-bar"
                class="h-full w-0 rounded-full bg-red-500"
              ></div>
            </div>
            <p id="err-password" class="hidden mt-1 text-xs text-red-400"></p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-1.5"
              >Confirm Password</label
            >
            <div class="relative">
              <input
                id="confirm"
                type="password"
                placeholder="Re-enter password"
                autocomplete="new-password"
                class="input-field w-full px-4 py-2.5 rounded-lg text-white placeholder-gray-500 text-sm pr-10"
              />
              <button
                type="button"
                onclick="togglePwd('confirm')"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors"
              >
                <svg
                  class="w-4 h-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
            </div>
            <p id="err-confirm" class="hidden mt-1 text-xs text-red-400"></p>
          </div>

          <!-- Role -->
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2"
              >I am a...</label
            >
            <div class="grid grid-cols-2 gap-3">
              <div class="role-option">
                <input
                  type="radio"
                  id="role-student"
                  name="role-radio"
                  value="student"
                  checked
                />
                <label for="role-student">
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 14l9-5-9-5-9 5 9 5z"
                    />
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 14l6.16-3.422A12.083 12.083 0 0121 12c0 3.866-4.03 7-9 7s-9-3.134-9-7a12.083 12.083 0 012.84-1.578L12 14z"
                    />
                  </svg>
                  Student
                </label>
              </div>
              <div class="role-option">
                <input
                  type="radio"
                  id="role-teacher"
                  name="role-radio"
                  value="teacher"
                />
                <label for="role-teacher">
                  <svg
                    class="w-4 h-4"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"
                    />
                  </svg>
                  Teacher
                </label>
              </div>
            </div>
            <!-- Hidden select synced with radio -->
            <select id="role" class="hidden">
              <option value="student">student</option>
              <option value="teacher">teacher</option>
            </select> 
          </div>

          <!-- Form-level error -->
          <p
            id="err-form"
            class="hidden text-xs text-red-400 bg-red-400/10 border border-red-400/20 rounded-lg px-3 py-2"
          ></p>

          <!-- Submit -->
          <button
            id="submit-btn"
            type="submit"
            class="btn-primary w-full py-2.5 rounded-lg text-white font-semibold text-sm flex items-center justify-center gap-2"
          >
            <span class="btn-text">Create Account</span>
            <span class="btn-spinner hidden"
              ><span class="spinner"></span
            ></span>
          </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-500">
          Already have an account?
          <a
            href="login.html"
            class="text-violet-400 hover:text-violet-300 font-medium transition-colors"
            >Sign in</a
          >
        </p>
      </div>
    </div>

    <script>
      // Sync radio buttons → hidden select
      document.querySelectorAll('input[name="role-radio"]').forEach((radio) => {
        radio.addEventListener("change", () => {
          document.getElementById("role").value = radio.value;
        });
      });

      function togglePwd(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      }

      function updateStrength(val) {
        const bar = document.getElementById("strength-bar");
        let score = 0;
        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const map = [
          { w: "0%", bg: "bg-red-500" },
          { w: "25%", bg: "bg-red-500" },
          { w: "50%", bg: "bg-yellow-500" },
          { w: "75%", bg: "bg-blue-500" },
          { w: "100%", bg: "bg-emerald-500" },
        ];
        bar.style.width = map[score].w;
        bar.className = `h-full rounded-full transition-all duration-300 ${map[score].bg}`;
      }
    </script>
    <script type="module" src="assets/js/auth.js"></script>
  </body>
</html>
